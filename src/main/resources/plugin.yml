name: HardcoreRevive
version: 1.0.0
main: com.hardcorerevive.HardcoreRevivePlugin
api-version: 1.20
author: YourName
description: 硬核复活系统 - 完整的死亡惩罚与复活机制

commands:
  revive:
    description: 复活自己或信任的死亡玩家
    usage: /revive <复活码> [玩家名]
    permission: hardcorerevive.revive
  sos:
    description: 发出求救信号
    usage: /sos
    permission: hardcorerevive.sos
  trust:
    description: 管理信任列表
    usage: /trust <add|remove|list> [玩家名]
    permission: hardcorevive.trust
  setjail:
    description: 设置小黑屋坐标
    usage: /setjail
    permission: hardcorerevive.admin
  reviveadmin:
    description: 管理员命令
    usage: /reviveadmin <subcommand>
    permission: hardcorerevive.admin
  bounty:
    description: 悬赏系统
    usage: /bounty <create|claim> <参数>
    permission: hardcorerevive.bounty
  hcreload:
    description: 重载配置文件
    usage: /hcreload
    permission: hardcorerevive.admin

permissions:
  hardcorerevive.revive:
    description: 使用复活码
    default: true
  hardcorerevive.sos:
    description: 发送求救信号
    default: true
  hardcorerevive.trust:
    description: 管理信任列表
    default: true
  hardcorevive.bounty:
    description: 使用悬赏系统
    default: true
  hardcorerevive.admin:
    description: 管理员权限
    default: op
